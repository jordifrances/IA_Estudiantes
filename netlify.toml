# netlify.toml — IA_Estudiantes
# Configuración para despliegue en Netlify

[build]
  publish = "."        # La raíz del proyecto es la carpeta de publicación
  command = ""         # Sin comando de build (sitio estático puro)

# Encabezados de seguridad y rendimiento
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Cache-Control          = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redireccionamiento 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
